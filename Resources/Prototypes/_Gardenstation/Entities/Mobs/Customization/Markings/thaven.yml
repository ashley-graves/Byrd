# hair
- type: marking
  id: ThavenHairChoices
  bodyPart: Hair
  markingCategory: Hair
  speciesRestriction: [ Thaven ]
  sprites:
  - sprite: _Gardenstation/Mobs/Customization/Thaven/hair.rsi
    state: choicesbangs

# chest
- type: marking
  id: ThavenChestPulse
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [ Thaven ]
