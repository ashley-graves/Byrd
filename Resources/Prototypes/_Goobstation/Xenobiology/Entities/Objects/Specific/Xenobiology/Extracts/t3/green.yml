- type: entity
  id: GreenSlimeExtract
  parent: BaseSlimeExtract
  name: green slime extract
  components:
  - type: Sprite
    layers:
    - sprite: _Goobstation/Xenobiology/Specific/Xenobiology/extract.rsi
      state: core
      color: "#4dff4d"
  - type: Reactive
    oneUnitReaction: true
    reactions:
    - reagents: [ Radium ]
      methods: [ Touch, Injection ]
      effects:
      - !type:MakeUnreactiveEntityEffect
      - !type:PopupMessage
        type: Pvs
        messages: [ "xeno-extract-reaction-reagent" ]
      - !type:PlaySoundEffect
        sound: /Audio/Effects/Chemistry/bubbles.ogg
      - !type:AdjustReagent
        # XenobioFelinidToxin # Byrd - Species change toxins are fucked up, re-add when they are not
        reagent: Toxin
        amount: 10
    - reagents: [ Plasma ]
      methods: [ Touch, Injection ]
      effects:
      - !type:MakeUnreactiveEntityEffect
      - !type:PopupMessage
        type: Pvs
        messages: [ "xeno-extract-reaction-reagent" ]
      - !type:PlaySoundEffect
        sound: /Audio/Effects/Chemistry/bubbles.ogg
      - !type:AdjustReagent
        # XenobioJellyGreen # Byrd - Species change toxins are fucked up, re-add when they are not
        reagent: Toxin
        amount: 10
    - reagents: [ Blood ]
      methods: [ Touch, Injection ]
      effects:
      - !type:MakeUnreactiveEntityEffect
      - !type:PopupMessage
        type: Pvs
        messages: [ "xeno-extract-reaction-reagent" ]
      - !type:PlaySoundEffect
        sound: /Audio/Effects/Chemistry/bubbles.ogg
      - !type:AdjustReagent
        # XenobioHumanToxin # Byrd - Species change toxins are fucked up, re-add when they are not
        reagent: Toxin
        amount: 10
  - type: Tag
    tags:
    - XenobiologyGreenExtract
