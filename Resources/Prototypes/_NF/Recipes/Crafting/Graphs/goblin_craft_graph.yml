# Furniture
- type: constructionGraph
  id: GoblinMadeBanner
  start: start
  graph:
  - node: start
    actions:
    - !type:DestroyEntity {}
    edges:
    - to: goblin_tool
      completed:
      - !type:SnapToGrid { }
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
      - material: Cloth
        amount: 2
        doAfter: 1
  - node: goblin_tool
    entity: BannerGoblin01
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 2
      - !type:SpawnPrototype
        prototype: MaterialCloth1
        amount: 2
      steps:
      - tool: Screwing
        doAfter: 1

# Vehicles
- type: constructionGraph
  id: GoblinMadeVehicleDumpster
  start: start
  graph:
  - node: start
    edges:
    - to: goblin_tool
      steps:
      - component: GoblinVehicle
        icon:
          sprite: _NF/Structures/Storage/magnetbox.rsi
          state: rubbishbox
        doAfter: 1
      - component: NFChairFolding
        icon:
          sprite: Structures/Furniture/folding_chair.rsi
          state: folding
        doAfter: 1
      - component: GoblinPreciousTrash
        icon:
          sprite: Objects/Consumable/Food/snacks.rsi
          state: boritos-trash
        doAfter: 0.2
      - component: GoblinPreciousTrash
        icon:
          sprite: Objects/Consumable/Food/snacks.rsi
          state: chips-trash
        doAfter: 0.2
      - material: Cable
        amount: 2
        doAfter: 0.5
  - node: goblin_tool
    entity: GoblinMadeVehicleDumpster
