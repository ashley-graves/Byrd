- type: entity
  id: BaseGoblinMadeToolsMalfunction
  abstract: true
  components:
  - type: TriggerOnSpawn
  - type: TimedDespawn
    lifetime: 5
    
- type: entity
  id: GoblinMadeToolMalfunctionEmp
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: EmpOnTrigger
    range: 4
    energyConsumption: 5000

- type: entity
  id: GoblinMadeToolMalfunctionFlash
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: FlashOnTrigger
    range: 4
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect

- type: entity
  id: GoblinMadeToolMalfunctionSmoke
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: SmokeOnTrigger
    duration: 3
    spreadAmount: 1
  - type: EmitSoundOnTrigger
    sound: /Audio/Effects/smoke.ogg
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

- type: entity
  id: GoblinMadeToolMalfunctionFireBomb
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 5
    intensitySlope: 2.5
    maxIntensity: 1
    canCreateVacuum: false

- type: entity
  id: GoblinMadeToolMalfunctionExplosion
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 5
    intensitySlope: 2.5
    maxIntensity: 1
    canCreateVacuum: false

- type: entity
  id: GoblinMadeToolMalfunctionCryo
  parent: BaseGoblinMadeToolsMalfunction
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Cryo
    totalIntensity: 5
    intensitySlope: 2.5
    maxIntensity: 1
    canCreateVacuum: false

- type: entityTable
  id: TableGoblinMadeToolMalfunction
  table: !type:GroupSelector
    children:
    - id: GoblinMadeToolMalfunctionEmp
      weight: 30
    - id: GoblinMadeToolMalfunctionFlash
      weight: 20
    - id: GoblinMadeToolMalfunctionSmoke
      weight: 35
    - id: GoblinMadeToolMalfunctionFireBomb
      weight: 5
    - id: GoblinMadeToolMalfunctionExplosion
      weight: 5
    - id: GoblinMadeToolMalfunctionCryo
      weight: 5

- type: entity
  id: SpawnGoblinMadeToolMalfunction
  parent: MarkerBase
  name: goblin tool malfunction
  components:
  - type: Sprite
    layers:
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red
  - type: EntityTableSpawner
    offset: 0.0
    table: !type:NestedSelector
      tableId: TableGoblinMadeToolMalfunction
      prob: 1.00
