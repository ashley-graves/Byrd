        state: overlay-inhand-right
        shader: unshaded
    storedRotation: 0
  - type: Clothing
    sprite: _NF/Objects/Tools/goblin_tools/lantern.rsi
  - type: PointLight
    enabled: false
    mask: null
    radius: 4
    energy: 2.5
    color: "#FFC458"
    netsync: false
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        #startingItem: GoblinMadePowerCell
  - type: Construction
    graph: GoblinMadeLantern
    node: goblin_tool
# endregion

