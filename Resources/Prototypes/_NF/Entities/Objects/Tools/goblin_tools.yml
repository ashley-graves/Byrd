#file: noinspection SpellCheckingInspection
- type: entity
  id: BaseGoblinMadeTools
  suffix: Goblin Made
  abstract: true
  components:
  - type: Timer
  - type: TimedSpawner
    prototypes:
    - SpawnGoblinMadeToolMalfunction
    chance: 0.05
    intervalSeconds: 1200 # 20 min
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SpawnGoblinMadeToolMalfunction:
            min: 1
            max: 1
  - type: Clothing # Apparently a lot of upstream tools have equipped sprites, but this bit isn't defined there
    quickEquip: false
    slots:
    - Belt
  - type: PhysicalComposition
    materialComposition:
      Steel: 100 # That's what you get for recycling 1 wrapper
  - type: StaticPrice
    price: 0 # Can't get rich :(
  - type: GoblinMade

# tools
#region multitool
- type: entity
  id: GoblinMadeMultitool
  parent: [ BaseGoblinMadeTools, Multitool ]
  name: hacking jig
  description: "An improvised multitool pieced together from faulty circuit board, broken display, bent antennae and stuffed into a discarded wrapper for additional protection against elements."
  components:
  - type: Sprite
    sprite: _NF/Objects/Tools/goblin_tools/multitool.rsi
    layers:
    - sprite: Objects/Consumable/Food/snacks.rsi
      state: cheesiehonkers
      map: [ "iconMultitoolWrapper" ]
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: icon-text-unshaded
      shader: unshaded
    - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
      state: overlay-icon
      shader: unshaded
  - type: Item
    sprite: _NF/Objects/Tools/goblin_tools/multitool.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
        state: overlay-inhand-left
        shader: unshaded
      right:
      - state: inhand-right
      - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
        state: overlay-inhand-right
        shader: unshaded
  - type: Clothing
    sprite: _NF/Objects/Tools/goblin_tools/multitool.rsi
  - type: RandomSprite
    available:
      - iconMultitoolWrapper:
          cheesiehonkers: ""
          cnds: ""
          chips: ""
          boritos: ""
          pistachio: ""
          raisins: ""
          semki: ""
          susjerky: ""
          chinese1: ""
          chinese2: ""
          chinese3: ""
          chinese4: ""
  - type: Construction
    graph: GoblinMadeMultitool
    node: goblin_tool
# endregion

#region wirecutter
- type: entity
  id: GoblinMadeWirecutter
  parent: [ BaseGoblinMadeTools, Wirecutter ]
  name: wiresnipper
  description: A wire cutter made out of glass shards, metal bits, cloth, and some wires. What's up with all the sparking, though?
  components:
  - type: Sprite
    sprite: _NF/Objects/Tools/goblin_tools/wirecutters.rsi
    layers:
    - state: icon
    - state: icon-color
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
      state: overlay-icon
      shader: unshaded
  - type: RandomSprite
    available:
      - enum.DamageStateVisualLayers.Base:
          icon-color: Rainbow
  - type: Item
    sprite: _NF/Objects/Tools/goblin_tools/wirecutters.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
        state: overlay-inhand-left
        shader: unshaded
      right:
      - state: inhand-right
      - sprite: _NF/Objects/Tools/goblin_tools/overlay_sparks.rsi
        state: overlay-inhand-right
        shader: unshaded
  - type: Clothing
    sprite: _NF/Objects/Tools/goblin_tools/wirecutters.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
  - type: Construction
    graph: GoblinMadeWirecutter
    node: goblin_tool
# endregion

