- type: entity
  parent: [ ClothingBeltStorageBase, ContentsExplosionResistanceBase, BaseSyndicateContraband ]
  id: ClothingBeltMilitaryRigHybrid
  name: hybrid tactical rig
  description: A hybrid rig that can store medical supplies and has slots for a sidearm, magazines.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Belt/grenaderig.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Belt/grenaderig.rsi
  - type: Storage
    grid:
      - 0,0,1,1
      - 3,0,6,1
      - 0,3,1,4
      - 3,3,6,4
    whitelist:
      tags:
        - MedicalPatch
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
      components:
        - Pill
        - Hypospray
        - SurgeryTool
        - Defibrillator
        - SolutionTransfer
  - type: ContainerContainer
    containers:
      pistol: !type:ContainerSlot
      mag1: !type:ContainerSlot
      mag2: !type:ContainerSlot
      mag3: !type:ContainerSlot
      mag4: !type:ContainerSlot
      mag5: !type:ContainerSlot
      mag6: !type:ContainerSlot
      storagebase: !type:Container
        ents: []
  - type: ItemSlots
    slots:
      pistol:
        name: Handgun
        whitelist:
          tags:
          - Sidearm
      mag1:
        name: Magazine 1
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle
      mag2:
        name: Magazine 2
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle
      mag3:
        name: Magazine 3
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle
      mag4:
        name: Magazine 4
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle
      mag5:
        name: Magazine 5
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle
      mag6:
        name: Magazine 6
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazineMagnum
          - SpeedLoaderMagnum
          - MagazinePistolCaselessRifle

